name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: yarn

    - name: Install dependencies
      run: yarn install --immutable --immutable-cache --check-cache

    - name: Install Playwright browsers
      run: yarn playwright install --with-deps

    - name: Run Playwright tests
      run: yarn playwright test

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-html-report
        path: playwright-report/
        retention-days: 30

    - name: Upload traces
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-traces
        path: test-results/**/trace*.zip
        retention-days: 30

    - name: Notify Teams on failure
      if: failure()
      run: |
        curl -H 'Content-Type: application/json' -d '{
          "@type": "MessageCard",
          "@context": "http://schema.org/extensions",
          "summary": "Playwright Tests Failed",
          "title": "Playwright Tests Failed",
          "text": "Pull Request: ${{ github.event.pull_request.title }}\nAuthor: ${{ github.event.pull_request.user.login }}\nBranch: ${{ github.head_ref }}\nWorkflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }' ${{ secrets.TEAMS_WEBHOOK_URL }}